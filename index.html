<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <title>Document</title>
</head>

<body>
    <div class="left">
        <img src="./images/plant.avif" class="plant-img" alt="plant image">
        <div class="icon-box">
            <img src="./images/odin-lined.png" class="icon-img" alt="icon" height="200px" width="auto">
            <h1>ODIN</h1>
        </div>
    </div>
    <div class="right">
        <div class="right-top">
            <p class="right-title">
                This is not a real online service! You know you need something like this in your life to help you
                realize
                your deepest dreams. <br>Sign up now to get started.
            </p>
            <p class="right-title-below"> You know you want to.</p>
        </div>
        <form action="#" method="post">
            <div class="form-box">
                <div class="full-name">
                    <div class="first">
                        <label for="first-name">FIRST NAME:</label>
                        <input type="text" id="first-name">
                    </div>
                    <div class="last">
                        <label for="last-name">LAST NAME:</label>
                        <input type="text" id="last-name">
                    </div>
                </div>
                <div class="email-tel">
                    <div class="email">
                        <label for="email">*EMAIL:</label>
                        <input type="email" id="email" required>
                    </div>
                    <div class="tel">
                        <label for="tel">PHONE NUMBER:</label>
                        <input type="tel" id="tel" required>
                    </div>
                </div>
                <div class="passwords">
                    <div class="password">
                        <label for="pass">*PASSWORD:</label>
                        <input type="password" id="pass" required>
                    </div>
                    <div class="password-confirm">
                        <label for="pass2">*CONFIRM PASSWORD:</label>
                        <input type="password" id="pass2" required>
                    </div>
                </div>
            </div>
            <button>Create Account</button>
            <p class="already">Already have an account ? <span> Log-In </span>
            </p>
        </form>
    </div>
</body>

</html>
